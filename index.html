<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poll</title>

<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  LMS POLL COMPONENT                                          ║
  ║  Embedded via iframe in Moodle                               ║
  ║                                                              ║
  ║  HOW IT WORKS                                                ║
  ║  1. Poll options appear instantly (no skeleton wait)         ║
  ║  2. User ID is received from Moodle via postMessage          ║
  ║     (requires footer script on Moodle — see README)         ║
  ║  3. Vote status checked in background — if already voted,    ║
  ║     results swap in silently without any visible delay       ║
  ║  4. On submit: results shown instantly (optimistic UI),      ║
  ║     then confirmed silently with Google Apps Script          ║
  ║                                                              ║
  ║  TO CREATE A NEW POLL                                        ║
  ║  1. Edit POLL.question and POLL.options below                ║
  ║  2. Update OPTIONS array in Apps Script to match exactly     ║
  ║  3. Create a new intake tab via Poll Admin menu in Sheet     ║
  ║  4. Update Moodle iframe src: ?intake=YourIntakeName         ║
  ║                                                              ║
  ║  MOODLE IFRAME (update intake name per cohort only):         ║
  ║  <iframe                                                     ║
  ║    src="https://rene849.github.io/poll-test/?intake=Jun2026" ║
  ║    style="width:100%;max-width:640px;height:490px;           ║
  ║           border:none;display:block;margin:0 auto;"          ║
  ║    title="Poll" allowfullscreen>                             ║
  ║  </iframe>                                                   ║
  ║                                                              ║
  ║  HEIGHT GUIDE (adjust iframe height to match):               ║
  ║  2 options → 370px                                           ║
  ║  3 options → 430px                                           ║
  ║  4 options → 490px                                           ║
  ║  5 options → 550px                                           ║
  ╚══════════════════════════════════════════════════════════════╝
-->

<style>
  /* ── Design tokens ─────────────────────────────────────────────
     Change these variables to restyle the entire poll.
     --brand        : bar fill colour and button background
     --bar-bg       : empty bar track background
     --text         : primary text colour
     --text-muted   : secondary/hint text — set to #0D0D0D for AAA compliance
     --focus        : keyboard focus ring colour — matches Moodle
     --error-bg     : error banner background
     --error-text   : error banner text and border colour — #E3120B preserved
     ──────────────────────────────────────────────────────────── */
  :root {
    --brand:      #2E45B8;   /* Economist Chicago 45 */
    --bar-bg:     #ebedfa;   /* Economist Chicago 95 */
    --text:       #0d0d0d;
    --text-muted: #0d0d0d;   /* Set to brand dark color to guarantee AAA compliance */
    --bg:         #ffffff;
    --radius:     4px;
    --font:       system-ui, 'Segoe UI', sans-serif;
    --focus:      #E3120B;   /* matches Moodle keyboard focus colour */
    --error-bg:   #ffffff;   /* white for accessibility — avoids low contrast */
    --error-text: #E3120B;   /* brand red text preserved */
    --error-border: #E3120B; /* brand red border preserved */
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: var(--font); background: transparent; color: var(--text); }
  body { padding: 16px; }

  /* ── Poll card ─────────────────────────────────────────────────
     Outer wrapper. min-height prevents the card collapsing while
     the skeleton loads. Keep in sync with iframe height guide above.
     ──────────────────────────────────────────────────────────── */
  .poll {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: var(--bg);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 24px;
    min-height: 360px;
    display: flex;
    flex-direction: column;
  }

  /* ── Question text ─────────────────────────────────────────── */
  .poll-question {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 20px;
  }

  /* ── View switching ────────────────────────────────────────────
     All views hidden by default. JS calls show()/hide() to switch.
     vote-view is shown immediately on load — no skeleton wait.
     ──────────────────────────────────────────────────────────── */
  #loading-view, #vote-view, #results-view {
    display: none;
    flex-direction: column;
    flex-grow: 1;
  }

  .options, .results {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── Option buttons ────────────────────────────────────────────
     Fixed height (50px) — must match .result-row height so the
     layout doesn't shift when switching from vote to results view.

     focus-visible uses --focus ring to match Moodle's keyboard
     navigation style. outline-offset keeps ring outside the border.
     ──────────────────────────────────────────────────────────── */
  .option-btn {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border: 1px solid #ddd;
    border-radius: var(--radius);
    background: var(--bg);
    cursor: pointer;
    font-size: 15px;
    color: var(--text);
    width: 100%;
    transition: 0.15s;
    font-family: var(--font);
    height: 50px;              /* keep in sync with .result-row height */
  }

  .option-btn:hover { background: #f9f9f9; border-color: var(--brand); }
  .option-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Keyboard focus ring — increased to 3px width to improve visual identification */
  .option-btn:focus-visible {
    outline: 3px solid var(--focus);
    outline-offset: 2px;
  }

  /* ── Submit button ─────────────────────────────────────────────
     Fixed height (44px) — must match .footer-text-line height.
     ──────────────────────────────────────────────────────────── */
  .submit-btn {
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    background: var(--brand);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    font-size: 15px;
    transition: opacity 0.2s, background 0.15s;
    height: 44px;              /* keep in sync with .footer-text-line height */
  }

  .submit-btn:hover    { background: #1a2a6e; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Keyboard focus ring on submit button — increased to 3px width */
  .submit-btn:focus-visible {
    outline: 3px solid var(--focus);
    outline-offset: 2px;
  }

  /* ── Result rows ───────────────────────────────────────────────
     Fixed height (74px) matching option-btn + label + bar.
     IMPORTANT: if you change padding or font sizes, re-measure
     total height and update the iframe height guide in the header.
     ──────────────────────────────────────────────────────────── */
  .result-row {
    border: 1px solid #e0e0e0;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    border-radius: var(--radius);
    height: 74px;              /* result-label (~20px) + gap (8px) + bar (20px) + padding (26px) */
  }

  .result-label {
    font-size: 14px;
    font-weight: 500;
    padding-bottom: 0.5rem;
    color: var(--text);
  }

  /* Highlight the option the learner chose */
  .result-label.mine { color: var(--brand); font-weight: 700; }

  .bar-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .bar-track {
    flex-grow: 1;
    height: 20px;
    background: var(--bar-bg);
    border-radius: var(--radius);
    overflow: hidden;
  }

  /* Bar animates from 0% to actual percentage on render */
  .bar-fill {
    height: 100%;
    background: var(--brand);
    width: 0%;
    transition: width 0.5s cubic-bezier(0.1,0.5,0.5,1);
    display: flex;
    align-items: center;      /* vertically centres content in bar */
    justify-content: flex-end;
    min-width: 24px;
  }

  /* ── Vote count inside bar ─────────────────────────────────────
     line-height: 1 prevents text descenders pushing the number
     off-centre within the bar height.
     ──────────────────────────────────────────────────────────── */
  .inner-number {
    color: white;
    font-size: 11px;
    line-height: 1;            /* prevents descenders shifting text off-centre */
    padding-right: 0.5rem;
    margin-top: -1px;          /* Centered perfectly within the blue container bar */
  }

  .result-pct {
    font-size: 14px;
    min-width: 38px;
    text-align: right;
    font-weight: 500;
    color: var(--text);
  }

  /* ── Footer line ───────────────────────────────────────────────
     Sits below result rows. Height (44px) matches .submit-btn so
     the overall card height stays identical between views.
     ──────────────────────────────────────────────────────────── */
  .footer-text-line {
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    height: 44px;              /* keep in sync with .submit-btn height */
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: var(--bar-bg);
    border-radius: var(--radius);
    font-weight: 500;
  }

  /* ── Skeleton loader ───────────────────────────────────────────
     Kept in code but no longer shown on initial load.
     Only used if JS explicitly calls show("loading-view").
     Dimensions match real buttons so no layout shift if shown.
     ──────────────────────────────────────────────────────────── */
  .skel {
    border-radius: var(--radius);
    background: linear-gradient(90deg, #f0f0f0 25%, #e4e4e4 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
  }

  .skel-option {
    height: 50px;              /* matches .option-btn height */
    margin-bottom: 10px;
  }

  .skel-option:last-child { margin-bottom: 0; }

  .skel-submit {
    height: 44px;              /* matches .submit-btn height */
    margin-top: 16px;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Error state ───────────────────────────────────────────────
     White background for accessibility — avoids contrast issues.
     Brand red (#E3120B) on text and border for clear signalling.
     Font scale and weight expanded to 18px / Bold to confirm with AA large text rules.
     ──────────────────────────────────────────────────────────── */
  .error-banner {
    padding: 16px;
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-radius: var(--radius);
    font-size: 18px;           /* Set to 18px to pass WCAG AA contrast rules for #E3120B */
    font-weight: 700;          /* Made bold to cleanly satisfy large text requirements without growing height */
    color: var(--error-text);
    line-height: 1.4;
    text-align: center;
  }

  #error-view {
    display: none;
    flex-grow: 1;
    align-items: flex-start;
    justify-content: flex-start;
  }

  @media (max-width: 480px) {
    .poll { padding: 16px; }
    .poll-question { font-size: 16px; }
    .option-btn { font-size: 14px; }
    .error-banner { font-size: 16px; } /* Clean scaling variant for small devices */
  }
</style>
</head>
<body>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxI2asjsvXhJ9RHo3GFlSbbAvRL08knfKty_iX64SHv6hwM7gix5WR2IRV0XOGpClIQ/exec";

const POLL = {
  question: "Which learning format do you find most effective?",
  options: [
    "Short videos (under 5 mins)",
    "Interactive scenarios",
    "Written guides and job aids",
    "Live virtual sessions"
  ]
};
</script>
<div class="poll">

  <div class="poll-question" id="poll-question"></div>

  <div id="loading-view">
    <div id="skel-options"></div>
    <div class="skel skel-submit"></div>
  </div>

  <div id="vote-view">
    <div class="options" id="options-list"></div>
    <button class="submit-btn" id="submit-btn" disabled onclick="submitVote()">
      Submit
    </button>
    <div id="vote-error-inline" class="error-banner" style="display:none"></div>
  </div>

  <div id="results-view">
    <div class="results" id="results-list"></div>
    <div class="footer-text-line">
      <span id="footer-text">You've already voted.</span>
      <span id="total-note"></span>
    </div>
  </div>

  <div id="error-view">
    <div class="error-banner" id="error-msg"></div>
  </div>

</div>


<script>
(function () {

  // ── State variables ──────────────────────────────────────────
  var intakeId = new URLSearchParams(window.location.search).get("intake") || null;
  var uid      = null;    // Moodle user ID — set via postMessage or URL param
  var uidReady = false;   // true once uid is resolved
  var hasVoted = false;   // true once optimistic results are shown
  var selected = null;    // index of selected option

  // ── Initialise ───────────────────────────────────────────────
  document.getElementById("poll-question").textContent = POLL.question;
  buildSkeleton();
  buildOptions();

  // Guard: no intake ID means the iframe URL is misconfigured
  if (!intakeId) {
    showError("Sorry, this poll is not working right now. Please use the chat icon to contact the student success team.");
    return;
  }

  // ── Show vote options immediately ─────────────────────────────
  // No skeleton wait — learner sees options instantly.
  // checkVoteStatus() runs in background; if user already voted
  // it silently swaps vote-view for results-view.
  show("vote-view");

  // ── Resolve user ID ──────────────────────────────────────────
  // Three sources in priority order:

  // 1. URL param — instant, used for direct browser testing
  //    e.g. poll-test/?intake=Jun2026&uid=testuser123
  var urlUid = new URLSearchParams(window.location.search).get("uid");
  if (urlUid) {
    uid = urlUid;
    uidReady = true;
    checkVoteStatus();
  } else {

    // 2. postMessage from Moodle footer script
    //    Moodle sends: { type: "moodleUserId", userId: 26 }
    //    Requires the postMessage snippet in Moodle Additional HTML
    window.addEventListener("message", function(event) {
      if (!event.data || event.data.type !== "moodleUserId") return;
      if (uidReady) return; // ignore duplicate messages
      uid = String(event.data.userId);
      uidReady = true;
      checkVoteStatus();
    });

    // 3. Fallback: proceed as "anonymous" after 1 second
    //    Reduced from 3s — postMessage is reliable in production.
    //    Anonymous users can vote but duplicate prevention won't work.
    setTimeout(function() {
      if (uidReady) return;
      uid = "anonymous";
      uidReady = true;
      checkVoteStatus();
    }, 1000);              /* reduced from 3000ms — postMessage arrives well within 1s */
  }


  // ── Check vote status ────────────────────────────────────────
  // Runs in background — vote options already visible to learner.
  // If user already voted → silently swap to results.
  // If not voted → do nothing, leave vote-view showing.
  function checkVoteStatus() {
    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ action: "load", intakeId: intakeId, uid: uid })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.ok) return; // silent fail — vote-view stays visible
      if (data.voted && !hasVoted) {
        // Already voted on a previous visit — swap to results silently
        renderResults(data.counts, data.total, false, data.answer);
      }
      // If not voted, do nothing — vote-view is already showing
    })
    .catch(function() {
      // Silent fail — vote-view stays visible, learner can still try to vote
    });
  }


  // ── Build skeleton ───────────────────────────────────────────
  // Creates one skel-option div per poll option so the skeleton
  // is exactly the same height as the real vote view.
  // Not shown on initial load but kept for edge cases.
  function buildSkeleton() {
    var skelList = document.getElementById("skel-options");
    POLL.options.forEach(function() {
      var s = document.createElement("div");
      s.className = "skel skel-option";
      skelList.appendChild(s);
    });
  }


  // ── Build options ────────────────────────────────────────────
  // Creates one button per option from the POLL.options array.
  // Built once on init — JS just shows/hides the vote-view div.
  function buildOptions() {
    var list = document.getElementById("options-list");
    POLL.options.forEach(function(opt, i) {
      var btn = document.createElement("button");
      btn.className   = "option-btn";
      btn.textContent = opt;
      btn.addEventListener("click", function() {
        selected = i;
        // Highlight selected, reset others
        document.querySelectorAll(".option-btn").forEach(function(b, idx) {
          b.style.borderColor = (idx === i) ? "var(--brand)" : "#ddd";
          b.style.background  = (idx === i) ? "#f4f6ff"      : "#fff";
        });
        document.getElementById("submit-btn").disabled = false;
      });
      list.appendChild(btn);
    });
  }


  // ── Submit vote ──────────────────────────────────────────────
  // Optimistic UI pattern:
  // 1. Show results immediately using local counts (feels instant)
  // 2. Send vote to Apps Script in background
  // 3. Silently update bars with real counts when response arrives
  window.submitVote = function() {
    if (selected === null || !uidReady) return;

    var chosenOption = POLL.options[selected];
    hasVoted = true;

    // Disable controls immediately
    document.getElementById("submit-btn").disabled = true;
    document.querySelectorAll(".option-btn").forEach(function(b) { b.disabled = true; });

    // Build optimistic counts — 1 for chosen option, 0 for rest
    var optimisticCounts = {};
    POLL.options.forEach(function(opt) {
      optimisticCounts[opt] = (opt === chosenOption) ? 1 : 0;
    });

    // Show results instantly — don't wait for backend
    renderResults(optimisticCounts, 1, true, chosenOption);

    // Confirm with Apps Script in background
    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        action:   "vote",
        intakeId: intakeId,
        option:   chosenOption,
        uid:      uid
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      // Silently update bars with real numbers from the Sheet
      if (data.ok && data.counts) {
        updateBars(data.counts, data.total);
        setFooter(data.total);
      }
    })
    .catch(function() {
      // Silent fail — optimistic results remain visible
    });
  };


  // ── Render results ───────────────────────────────────────────
  // Builds result rows and switches to results view.
  // Called on submit (optimistic) and when returning voter loads.
  function renderResults(counts, total, justVoted, myAnswer) {
    var box       = document.getElementById("results-list");
    var safeTotal = total || 0;
    box.innerHTML = "";

    POLL.options.forEach(function(opt, idx) {
      var votes = (counts && counts[opt]) ? counts[opt] : 0;
      var pct   = safeTotal > 0 ? Math.round((votes / safeTotal) * 100) : 0;
      var mine  = opt === myAnswer;

      var row = document.createElement("div");
      row.className = "result-row";
      row.innerHTML =
        '<div class="result-label' + (mine ? " mine" : "") + '">' +
          (mine ? "✓ " : "") + opt +
        '</div>' +
        '<div class="bar-container">' +
          '<div class="bar-track">' +
            '<div class="bar-fill" style="width:0%">' +
              '<span class="inner-number">' + votes + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="result-pct">' + pct + '%</div>' +
        '</div>';
      box.appendChild(row);
    });

    setFooter(safeTotal);
    hide("loading-view");
    hide("vote-view");
    show("results-view");

    // Animate bars on next paint
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        box.querySelectorAll(".result-row").forEach(function(row, idx) {
          var opt   = POLL.options[idx];
          var votes = (counts && counts[opt]) ? counts[opt] : 0;
          var pct   = safeTotal > 0 ? Math.round((votes / safeTotal) * 100) : 0;
          var bar   = row.querySelector(".bar-fill");
          if (bar) bar.style.width = pct + "%";
        });
      });
    });
  }


  // ── Update bars silently ─────────────────────────────────────
  // Called after backend confirms vote — updates numbers in place
  // without re-rendering, so there's no visible flash.
  function updateBars(counts, total) {
    var safeTotal = total || 0;
    document.querySelectorAll(".result-row").forEach(function(row, idx) {
      var opt   = POLL.options[idx];
      var votes = (counts && counts[opt]) ? counts[opt] : 0;
      var pct   = safeTotal > 0 ? Math.round((votes / safeTotal) * 100) : 0;
      var bar   = row.querySelector(".bar-fill");
      var num   = row.querySelector(".inner-number");
      var pctEl = row.querySelector(".result-pct");
      if (bar)   bar.style.width   = pct + "%";
      if (num)   num.textContent   = votes;
      if (pctEl) pctEl.textContent = pct + "%";
    });
  }


  // ── Set footer text ──────────────────────────────────────────
  // "You've already voted. There are N responses so far."
  function setFooter(total) {
    var safeTotal = total || 0;
    var count = safeTotal + " response" + (safeTotal !== 1 ? "s" : "") + " so far.";
    document.getElementById("footer-text").textContent = "You've already voted.";
    document.getElementById("total-note").textContent  = "There are " + count;
  }


  // ── Helpers ──────────────────────────────────────────────────
  function show(id) { document.getElementById(id).style.display = "flex"; }
  function hide(id) { document.getElementById(id).style.display = "none"; }

  function showError(msg) {
    hide("loading-view");
    hide("vote-view");
    document.getElementById("error-msg").textContent = msg;
    show("error-view");
  }

})();
</script>

<script>
(function() {
  var lastHeight = 0;
  var stableCount = 0;

  function sendHeight() {
    var currentHeight = document.body.scrollHeight;
    if (currentHeight === lastHeight) {
      stableCount++;
      if (stableCount >= 3) return;
    } else {
      stableCount = 0;
      lastHeight = currentHeight;
    }
    window.parent.postMessage({
      type: 'iframe-height',
      height: currentHeight
    }, '*');
  }

  setTimeout(function() {
    sendHeight();
    var retryCount = 0;
    var retryInterval = setInterval(function() {
      sendHeight();
      retryCount++;
      if (retryCount >= 10) clearInterval(retryInterval);
    }, 300);
  }, 500);

  if (window.ResizeObserver) {
    var observer = new ResizeObserver(function() {
      stableCount = 0;
      sendHeight();
    });
    observer.observe(document.body);
  }
})();
</script>

</body>
</html>
