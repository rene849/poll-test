<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poll</title>
<style>
  :root {
    --brand:      #2E45B8;
    --bar-bg:     #ebedfa;
    --text:       #0d0d0d;
    --text-muted: #555555;
    --bg:         #ffffff;
    --radius:     4px;
    --font:       system-ui, 'Segoe UI', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: var(--font); background: transparent; color: var(--text); }

  body {
    padding: 16px;
  }

  .poll {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: var(--bg);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 24px;
    height: 390px; 
    display: flex;
    flex-direction: column;
  }

  .poll-question {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 20px; 
  }

  #loading-view, #vote-view, #results-view {
    display: none; 
    flex-direction: column;
    flex-grow: 1;
  }

  #loading-view { display: flex; } 

  .options, .results { 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
  }

  .option-btn {
    display: flex; align-items: center; padding: 14px 16px;
    border: 1px solid #ddd; border-radius: var(--radius);
    background: var(--bg); cursor: pointer; font-size: 15px;
    color: var(--text); width: 100%; transition: 0.15s;
    font-family: var(--font);
    height: 50px;
  }
  .option-btn:hover  { background: #f9f9f9; border-color: var(--brand); }
  .option-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .submit-btn {
    margin-top: 16px;
    width: 100%; padding: 12px;
    background: var(--brand); color: #fff; border: none;
    border-radius: var(--radius); font-weight: 600; cursor: pointer;
    font-family: var(--font); font-size: 15px;
    transition: opacity 0.2s, background 0.15s;
    height: 44px;
  }
  .submit-btn:hover    { background: #1a2a6e; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .result-row {
    border: 1px solid #e0e0e0;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    border-radius: var(--radius);
    height: 74px;
  }

  .result-label {
    font-size: 14px; font-weight: 500;
    padding-bottom: 0.5rem; 
    color: var(--text);
  }
  .result-label.mine { color: var(--brand); font-weight: 700; }

  .bar-container {
    display: flex; align-items: center;
    justify-content: space-between; gap: 12px;
  }

  .bar-track {
    flex-grow: 1; height: 20px;
    background: var(--bar-bg); position: relative;
    border-radius: var(--radius);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%; background: var(--brand);
    width: 0%; transition: width 0.5s cubic-bezier(0.1,0.5,0.5,1);
    display: flex; align-items: center;
    justify-content: flex-end; min-width: 24px;
  }

  .inner-number { 
    color: white; font-size: 11px; 
    padding-right: 0.5rem; 
  }
  .result-pct { font-size: 14px; min-width: 38px; text-align: right; font-weight: 500; color: var(--text); }

  .footer-text-line {
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .skel {
    border-radius: var(--radius);
    background: #f0f0f0;
    animation: pulse 1.5s infinite ease-in-out;
  }
  .skel-option { height: 50px; margin-bottom: 10px; }
  .skel-option:last-child { margin-bottom: 0; }
  .skel-submit { height: 44px; margin-top: 16px; }

  @keyframes pulse {
    0%   { opacity: 0.6; }
    50%  { opacity: 1.0; }
    100% { opacity: 0.6; }
  }

  .error-banner {
    padding: 16px; background: #fdf3f2; border: 1px solid #e8b4b0;
    border-radius: var(--radius); font-size: 14px; color: #7a2020;
    line-height: 1.5; text-align: center;
  }
  #error-view { display: none; flex-grow: 1; align-items: center; justify-content: center; }
</style>
</head>
<body>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxI2asjsvXhJ9RHo3GFlSbbAvRL08knfKty_iX64SHv6hwM7gix5WR2IRV0XOGpClIQ/exec";

const POLL = {
  question: "Which learning format do you find most effective?",
  options: [
    "Short videos (under 5 mins)",
    "Interactive scenarios",
    "Written guides and job aids",
    "Live virtual sessions"
  ]
};
</script>

<div class="poll">
  <div class="poll-question" id="poll-question"></div>

  <div id="loading-view">
    <div id="skel-options"></div>
    <div class="skel skel-submit"></div>
  </div>

  <div id="vote-view">
    <div class="options" id="options-list"></div>
    <button class="submit-btn" id="submit-btn" disabled onclick="submitVote()">Submit answer</button>
    <div id="vote-error-inline" class="error-banner" style="display:none"></div>
  </div>

  <div id="results-view">
    <div class="results" id="results-list"></div>
    <div class="footer-text-line">
      <span>You've responded to this poll.</span>
      <span id="total-note">0 responses so far.</span>
    </div>
  </div>

  <div id="error-view">
    <div class="error-banner" id="error-msg"></div>
  </div>
</div>

<script>
(function () {
  var intakeId  = new URLSearchParams(window.location.search).get("intake") || null;
  var uid       = null;
  var uidReady  = false;
  var hasVoted  = false;
  var selected  = null;

  document.getElementById("poll-question").textContent = POLL.question;

  var skelList = document.getElementById("skel-options");
  POLL.options.forEach(function() {
    var s = document.createElement("div");
    s.className = "skel skel-option";
    skelList.appendChild(s);
  });

  buildOptions();

  if (!intakeId) {
    showError("This poll is currently unavailable.");
    return;
  }

  var urlUid = new URLSearchParams(window.location.search).get("uid");
  if (urlUid) {
    uid = urlUid; uidReady = true; checkVoteStatus();
  } else {
    window.addEventListener("message", function(event) {
      if (!event.data || event.data.type !== "moodleUserId") return;
      if (uidReady) return;
      uid = String(event.data.userId); uidReady = true; checkVoteStatus();
    });
    setTimeout(function() {
      if (uidReady) return;
      uid = "anonymous"; uidReady = true; checkVoteStatus();
    }, 3000);
  }

  function checkVoteStatus() {
    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ action: "load", intakeId: intakeId, uid: uid })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      hide("loading-view");
      if (!data.ok) { show("vote-view"); return; }
      if (data.voted) { renderResults(data.counts, data.total, false, data.answer); } 
      else { show("vote-view"); }
    })
    .catch(function() { hide("loading-view"); show("vote-view"); });
  }

  function buildOptions() {
    var list = document.getElementById("options-list");
    POLL.options.forEach(function(opt, i) {
      var btn = document.createElement("button");
      btn.className = "option-btn";
      btn.textContent = opt;
      btn.addEventListener("click", function() {
        selected = i;
        document.querySelectorAll(".option-btn").forEach(function(b, idx) {
          b.style.borderColor = (idx === i) ? "var(--brand)" : "#ddd";
          b.style.background  = (idx === i) ? "#f4f6ff"      : "#fff";
        });
        document.getElementById("submit-btn").disabled = false;
      });
      list.appendChild(btn);
    });
  }

  window.submitVote = function() {
    if (selected === null || !uidReady) return;
    var chosenOption = POLL.options[selected];
    hasVoted = true;

    document.getElementById("submit-btn").disabled = true;
    document.querySelectorAll(".option-btn").forEach(function(b) { b.disabled = true; });

    var optimisticCounts = {};
    POLL.options.forEach(function(opt) { optimisticCounts[opt] = (opt === chosenOption) ? 1 : 0; });
    renderResults(optimisticCounts, 1, true, chosenOption);

    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ action: "vote", intakeId: intakeId, option: chosenOption, uid: uid })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok && data.counts) {
        updateBars(data.counts, data.total);
        document.getElementById("total-note").textContent = data.total + " responses so far.";
      }
    })
    .catch(function() {});
  };

  function renderResults(counts, total, justVoted, myAnswer) {
    var box = document.getElementById("results-list");
    var safeTotal = total || 0;
    box.innerHTML = "";

    POLL.options.forEach(function(opt, idx) {
      var votes = (counts && counts[opt]) ? counts[opt] : 0;
      var pct   = safeTotal > 0 ? Math.round((votes / safeTotal) * 100) : 0;
      var mine  = opt === myAnswer;

      var row = document.createElement("div");
      row.className = "result-row";
      row.innerHTML =
        '<div class="result-label' + (mine ? " mine" : "") + '">' + (mine ? "✓ " : "") + opt + '</div>' +
        '<div class="bar-container">' +
          '<div class="bar-track">' +
            '<div class="bar-fill" style="width:0%"><span class="inner-number">' + votes + '</span></div>' +
          '</div>' +
          '<div class="result-pct">' + pct + '%</div>' +
        '</div>';
      box.appendChild(row);
    });

    document.getElementById("total-note").textContent = safeTotal + " responses so far.";
    hide("loading-view");
    hide("vote-view");
    show("results-view");

    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        box.querySelectorAll(".result-row").forEach(function(row, idx) {
          var opt = POLL.options[idx];
          var votes = (counts && counts[opt]) ? counts[opt] : 0;
          var pct = safeTotal > 0 ? Math.round((votes / safeTotal) * 100) : 0;
          var bar = row.querySelector(".bar-fill");
          if (bar) bar.style.width = pct + "%";
        });
      });
    });
  }

  function updateBars(counts, total) {
    var safeTotal = total || 0;
    document.querySelectorAll(".result-row").forEach(function(row, idx) {
      var opt = POLL.options[idx];
      var votes = (counts && counts[opt]) ? counts[opt] : 0;
      var pct = safeTotal > 0 ? Math.round((votes / safeTotal) * 100) : 0;
      var bar = row.querySelector(".bar-fill");
      var num = row.querySelector(".inner-number");
      var pctEl = row.querySelector(".result-pct");
      if (bar) bar.style.width = pct + "%";
      if (num) num.textContent = votes;
      if (pctEl) pctEl.textContent = pct + "%";
    });
  }

  function show(id) { document.getElementById(id).style.display = "flex"; }
  function hide(id) { document.getElementById(id).style.display = "none";
