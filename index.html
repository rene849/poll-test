<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poll</title>
<style>
  :root {
    --brand:       #2E45B8; /* Chicago 45 */
    --bar-bg:      #ebedfa; /* Chicago 95 */
    --text:        #0d0d0d; /* Chicago Font Color */
    --text-muted:  #555555;
    --bg:          #ffffff;
    --radius:      4px;
    --font:        system-ui, 'Segoe UI', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: var(--font); background: transparent; color: var(--text); }

  body { display: flex; align-items: flex-start; justify-content: center; padding: 16px; }

  .poll {
    width: 100%;
    max-width: 600px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: var(--bg);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 30px;
  }

  .poll-question { 
    font-size: 19px; 
    font-weight: 600; 
    color: var(--text); 
    line-height: 1.4; 
    margin-bottom: 24px;
  }

  /* ── Options View ── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex; align-items: center; padding: 14px 16px;
    border: 1px solid #ddd; border-radius: var(--radius);
    background: var(--bg); cursor: pointer; font-size: 15px;
    color: var(--text); width: 100%; transition: 0.15s;
  }
  .option-btn:hover { background: #f9f9f9; border-color: var(--brand); }

  .submit-btn {
    margin-top: 16px; width: 100%; padding: 12px;
    background: var(--brand); color: #fff; border: none;
    border-radius: var(--radius); font-weight: 600; cursor: pointer;
    transition: opacity 0.2s;
  }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Results View ── */
  .results { display: flex; flex-direction: column; gap: 15px; }
  .result-row { border: 1px solid #e0e0e0; padding: 15px; display: flex; flex-direction: column; }
  .result-label { font-size: 16px; font-weight: 500; padding-bottom: 0.5rem; color: var(--text); }
  .bar-container { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  
  .bar-track { 
    flex-grow: 1; 
    height: 40px; 
    background: var(--bar-bg); /* Chicago 95 */
    position: relative; 
  }

  .bar-fill { 
    height: 100%; 
    background: var(--brand); /* Chicago 45 */
    width: 0%; 
    transition: width 0.6s cubic-bezier(0.1, 0.5, 0.5, 1); 
    display: flex; 
    align-items: center; 
    justify-content: flex-end; 
  }

  .inner-number { 
    color: white; 
    font-size: 14px; 
    padding-right: 0.5rem; /* Requested Padding */
  }

  .result-pct { 
    font-size: 16px; 
    min-width: 45px; 
    text-align: right; 
    font-weight: 500;
    color: var(--text);
  }

  .total-note { margin-top: 20px; font-size: 12px; color: var(--text-muted); text-align: right; }

  /* Skeleton Loading State */
  .skeleton-bar { height: 80px; background: #f9f9f9; border: 1px solid #eee; margin-bottom: 15px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 50% { opacity: 0.5; } }
</style>
</head>
<body>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxI2asjsvXhJ9RHo3GFlSbbAvRL08knfKty_iX64SHv6hwM7gix5WR2IRV0XOGpClIQ/exec";

const POLL = {
  question: "Would you rather have a hearty greeting or a cordial one?",
  options: ["Hearty", "Cordial"]
};
</script>

<div class="poll">
  <div class="poll-question">Would you rather have a hearty greeting or a cordial one?</div>
  
  <div class="poll-body">
    <div id="loading-view">
      <div class="skeleton-bar"></div>
      <div class="skeleton-bar"></div>
    </div>

    <div id="vote-view" style="display:none">
      <div class="options" id="options-list"></div>
      <button class="submit-btn" id="submit-btn" disabled onclick="submitVote()">Submit answer</button>
    </div>

    <div id="results-view" style="display:none">
      <div class="results" id="results-list"></div>
      <p class="total-note" id="total-note"></p>
    </div>
  </div>
</div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const intakeId = params.get("intake") || "default"; 
  const uid = params.get("uid") || "user";
  let selected = null;

  buildOptions();

  // Load the initial state from Google Apps Script
  fetch(SCRIPT_URL, {
    method: "POST",
    mode: 'no-cors', // Optimization for Apps Script latency
    body: JSON.stringify({ action: "load", intakeId: intakeId, uid: uid })
  }).catch(() => {}); // Silent catch for no-cors 

  // We actually perform a standard fetch to get data
  fetch(SCRIPT_URL + "?action=load&intakeId=" + intakeId + "&uid=" + uid)
  .then(r => r.json())
  .then(data => {
    document.getElementById("loading-view").style.display = "none";
    if (data.voted) {
      renderResults(data.counts, data.total || 0, data.answer);
    } else {
      document.getElementById("vote-view").style.display = "block";
    }
  })
  .catch(() => {
    document.getElementById("loading-view").style.display = "none";
    document.getElementById("vote-view").style.display = "block";
  });

  function buildOptions() {
    const list = document.getElementById("options-list");
    POLL.options.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.textContent = opt;
      btn.onclick = () => {
        selected = i;
        document.querySelectorAll(".option-btn").forEach((b, idx) => {
           b.style.borderColor = (idx === i) ? "var(--brand)" : "#ddd";
           b.style.background = (idx === i) ? "#f4f6ff" : "#fff";
        });
        document.getElementById("submit-btn").disabled = false;
      };
      list.appendChild(btn);
    });
  }

  window.submitVote = function() {
    const btn = document.getElementById("submit-btn");
    btn.disabled = true;
    btn.textContent = "Submitting...";

    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ action: "vote", intakeId: intakeId, option: POLL.options[selected], uid: uid })
    })
    .then(r => r.json())
    .then(data => renderResults(data.counts, data.total || 0, POLL.options[selected]));
  };

  function renderResults(counts, total, myAnswer) {
    const box = document.getElementById("results-list");
    box.innerHTML = "";
    const safeTotal = total || 0;

    POLL.options.forEach(opt => {
      const votes = (counts && counts[opt]) ? counts[opt] : 0;
      const pct = safeTotal > 0 ? Math.round((votes / safeTotal) * 100) : 0;

      const row = document.createElement("div");
      row.className = "result-row";
      row.innerHTML = `
        <div class="result-label">${opt}</div>
        <div class="bar-container">
          <div class="bar-track">
            <div class="bar-fill" style="width: ${pct}%">
              <span class="inner-number">${votes}</span>
            </div>
          </div>
          <div class="result-pct">${pct}%</div>
        </div>
      `;
      box.appendChild(row);
    });

    document.getElementById("total-note").textContent = safeTotal + " responses so far";
    document.getElementById("loading-view").style.display = "none";
    document.getElementById("vote-view").style.display = "none";
    document.getElementById("results-view").style.display = "block";
  }
})();
</script>
</body>
</html>
