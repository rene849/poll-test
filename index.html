<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poll</title>
<style>
  :root {
    --brand:      #2E45B8;
    --bar-bg:     #ebedfa;
    --text:       #0d0d0d;
    --text-muted: #555555;
    --bg:         #ffffff;
    --radius:     4px;
    --font:       system-ui, 'Segoe UI', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: var(--font); background: transparent; color: var(--text); }

  body {
    padding: 16px;
  }

  /* ── Poll wrapper — Explicit static height for absolute Moodle iframe stability ── */
  .poll {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: var(--bg);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 24px;
    height: 410px; /* Locked down so both screens fit precisely with even padding */
    display: flex;
    flex-direction: column;
  }

  .poll-question {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 12px; /* Reduced to pull answer options closer to the text */
    min-height: 52px;
  }

  /* ── Structural Layout Views (Restored to original baseline) ── */
  #loading-view {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .skel {
    border-radius: var(--radius);
    background: linear-gradient(90deg, #f0f0f0 25%, #e4e4e4 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
  }
  .skel-option { height: 50px; }
  .skel-submit { height: 44px; margin-top: 12px; }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Options Block ── */
  #vote-view { display: none; flex-direction: column; flex: 1; }
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    display: flex; align-items: center; padding: 14px 16px;
    border: 1px solid #ddd; border-radius: var(--radius);
    background: var(--bg); cursor: pointer; font-size: 15px;
    color: var(--text); width: 100%; transition: 0.15s;
    font-family: var(--font);
    height: 50px;
  }
  .option-btn:hover  { background: #f9f9f9; border-color: var(--brand); }
  .option-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .submit-btn {
    margin-top: 12px; /* Balanced even spacing below options */
    width: 100%; padding: 12px;
    background: var(--brand); color: #fff; border: none;
    border-radius: var(--radius); font-weight: 600; cursor: pointer;
    font-family: var(--font); font-size: 15px;
    transition: opacity 0.2s, background 0.15s;
    height: 44px;
  }
  .submit-btn:hover    { background: #1a2a6e; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Error Banner ── */
  .error-banner {
    padding: 10px 14px;
    background: #fdf3f2; border: 1px solid #e8b4b0;
    border-radius: var(--radius); font-size: 13px;
    color: #7a2020; line-height: 1.5; margin-top: 10px;
  }

  /* ── Results Block ── */
  #results-view { display: none; flex-direction: column; flex: 1; }
  .results { display: flex; flex-direction: column; gap: 10px; }

  .result-row {
    border: 1px solid #e0e0e0;
    padding: 12px 15px;
    display: flex;
    flex-direction: column;
    border-radius: var(--radius);
  }

  .result-label {
    font-size: 15px; font-weight: 500;
    padding-bottom: 0.5rem; color: var(--text);
  }
  .result-label.mine { color: var(--brand); font-weight: 700; }

  .bar-container {
    display: flex; align-items: center;
    justify-content: space-between; gap: 12px;
  }

  .bar-track {
    flex-grow: 1; height: 36px;
    background: var(--bar-bg); position: relative;
    border-radius: var(--radius);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%; background: var(--brand);
    width: 0%; transition: width 0.5s cubic-bezier(0.1,0.5,0.5,1);
    display: flex; align-items: center;
    justify-content: flex-end; min-width: 28px;
  }

  .inner-number { color: white; font-size: 13px; padding-right: 0.5rem; }
  .result-pct { font-size: 15px; min-width: 42px; text-align: right; font-weight: 500; color: var(--text); }

  /* ── Restructured Footnotes (Clean, crisp, evenly spaced text) ── */
  .footer-text-line {
    margin-top: 12px; /* Matches submit button margin exactly */
    height: 44px; /* Matches submit button footprint exactly */
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    gap: 4px;
  }

  @media (max-width: 480px) {
    .poll { padding: 16px; height: 390px; }
    .poll-question { font-size: 16px; }
    .option-btn { font-size: 14px; height: 46px; }
    .bar-track { height: 32px; }
  }
</style>
</head>
