<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poll</title>

<style>
:root {
  --brand: #263997;
  --brand-dark: #1a2a6e;
  --brand-light: #e8ecf9;
  --brand-mid: #c5ceee;
  --text: #111111;
  --text-muted: #555555;
  --bg: #ffffff;
  --radius: 8px;
  --font: system-ui, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  font-family: var(--font);
  background: transparent;
  color: var(--text);
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 16px;
}

.poll {
  width: 100%;
  max-width: 600px;
  background: var(--bg);
  border: 1px solid var(--brand-mid);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(38,57,151,0.08);
}

.poll-header {
  background: var(--brand);
  padding: 18px 24px;
}

.poll-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.7);
  margin-bottom: 6px;
}

.poll-question {
  font-size: 17px;
  font-weight: 600;
  color: #fff;
  line-height: 1.4;
}

.poll-body {
  padding: 20px 24px 24px;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid var(--brand-mid);
  border-radius: var(--radius);
  background: white;
  cursor: pointer;
  text-align: left;
  font-size: 15px;
  transition: 0.2s;
}

.option-btn:hover {
  border-color: var(--brand);
  background: var(--brand-light);
}

.option-btn.selected {
  border-color: var(--brand);
  background: var(--brand-light);
}

.submit-btn {
  width: 100%;
  margin-top: 16px;
  padding: 12px;
  border: none;
  border-radius: var(--radius);
  background: var(--brand);
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.submit-btn:disabled {
  background: var(--brand-mid);
  cursor: not-allowed;
}

.results {
  margin-top: 20px;
  display: none;
}

.result-row {
  margin-bottom: 14px;
}

.result-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 14px;
}

.bar-track {
  height: 10px;
  background: var(--brand-light);
  border-radius: 999px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  width: 0%;
  background: var(--brand);
  transition: width 0.5s ease;
}

@media (max-width: 480px) {
  .poll-header {
    padding: 14px 16px;
  }

  .poll-body {
    padding: 14px 16px 18px;
  }
}
</style>
</head>
<body>

<!-- POLL CONFIG -->
<script>
const SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_URL_HERE";

const POLL = {
  question: "Which learning format do you find most effective?",
  options: [
    "Short videos (under 5 mins)",
    "Interactive scenarios",
    "Written guides and job aids",
    "Live virtual sessions"
  ]
};
</script>

<div class="poll">
  <div class="poll-header">
    <div class="poll-label">Quick poll</div>
    <div class="poll-question" id="poll-question"></div>
  </div>

  <div class="poll-body">
    <div class="options" id="options-list"></div>

    <button
      class="submit-btn"
      id="submit-btn"
      disabled
      onclick="submitVote()"
    >
      Submit answer
    </button>

    <div class="results" id="results-list"></div>
  </div>
</div>

<script>
let selected = null;

document.getElementById("poll-question").textContent = POLL.question;

const optionsList = document.getElementById("options-list");

POLL.options.forEach((option, index) => {
  const button = document.createElement("button");
  button.className = "option-btn";
  button.textContent = option;

  button.addEventListener("click", () => {
    selected = index;

    document.querySelectorAll(".option-btn").forEach(btn => {
      btn.classList.remove("selected");
    });

    button.classList.add("selected");
    document.getElementById("submit-btn").disabled = false;
  });

  optionsList.appendChild(button);
});

function submitVote() {
  if (selected === null) return;

  const chosenOption = POLL.options[selected];

  fetch(SCRIPT_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action: "vote",
      option: chosenOption
    })
  })
  .then(response => response.json())
  .then(data => {
    if (data.ok) {
      renderResults(data.counts || {});
    } else {
      alert("Could not save vote.");
    }
  })
  .catch(() => {
    alert("Server connection failed.");
  });
}

function renderResults(counts) {
  const results = document.getElementById("results-list");
  results.innerHTML = "";
  results.style.display = "block";

  let total = 0;
  Object.values(counts).forEach(v => total += v);

  POLL.options.forEach(option => {
    const votes = counts[option] || 0;
    const percent = total ? Math.round((votes / total) * 100) : 0;

    const row = document.createElement("div");
    row.className = "result-row";

    row.innerHTML = `
      <div class="result-label">
        <span>${option}</span>
        <span>${percent}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${percent}%"></div>
      </div>
    `;

    results.appendChild(row);
  });
}
</script>

</body>
</html>
