<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poll</title>
<style>
  :root {
    --brand:       #263997; /* The blue fill color */
    --bar-bg:      rgb(246, 215, 201); /* Your requested background color */
    --text:        #0d0d0d; /* Your requested text color */
    --text-muted:  #555555;
    --bg:          #ffffff;
    --radius:      4px;
    --font:        system-ui, 'Segoe UI', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: var(--font); background: transparent; color: var(--text); }

  body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 16px;
  }

  .poll {
    width: 100%;
    max-width: 600px;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 30px;
  }

  /* Header removed, title is now part of the body */
  .poll-question { 
    font-size: 19px; 
    font-weight: 500; 
    color: var(--text); 
    line-height: 1.4; 
    margin-bottom: 24px;
  }

  /* ── Options (Voting View) ── */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border: 1px solid #ddd;
    border-radius: var(--radius);
    background: var(--bg);
    cursor: pointer;
    font-family: var(--font);
    font-size: 15px;
    color: var(--text);
    width: 100%;
    transition: background 0.15s;
  }

  .option-btn:hover { background: #f9f9f9; border-color: var(--brand); }

  .submit-btn {
    margin-top: 16px; width: 100%; padding: 12px;
    background: var(--brand); color: #fff; border: none;
    border-radius: var(--radius); font-weight: 600; cursor: pointer;
  }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* ── Results View ── */
  .results { display: flex; flex-direction: column; gap: 15px; }
  
  .result-row { 
    display: flex; 
    flex-direction: column; 
    border: 1px solid #e0e0e0; 
    padding: 15px;
  }

  .result-label { 
    font-size: 16px; 
    color: var(--text); 
    font-weight: 500;
    padding-bottom: 0.5rem; /* Your requested padding */
  }

  .bar-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .bar-track { 
    flex-grow: 1;
    height: 40px; 
    background: var(--bar-bg); /* Your requested RGB background */
    position: relative;
  }

  .bar-fill { 
    height: 100%; 
    background: var(--brand); 
    width: 0%; 
    transition: width 0.8s ease-out;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .inner-number {
    color: white;
    font-size: 14px;
    padding-right: 0.5rem; /* Your requested padding */
  }

  .result-pct { 
    font-size: 16px; 
    color: var(--text); 
    min-width: 45px;
    text-align: right;
  }

  .total-note { margin-top: 20px; font-size: 12px; color: var(--text-muted); text-align: right; }
</style>
</head>
<body>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxI2asjsvXhJ9RHo3GFlSbbAvRL08knfKty_iX64SHv6hwM7gix5WR2IRV0XOGpClIQ/exec";

const POLL = {
  question: "Would you rather have a hearty greeting or a cordial one?",
  options: ["Hearty", "Cordial"]
};
</script>

<div class="poll">
  <div class="poll-question" id="poll-question"></div>
  
  <div class="poll-body">
    <div id="skeleton-view">Loading...</div>

    <div id="vote-view" style="display:none">
      <div class="options" id="options-list"></div>
      <button class="submit-btn" id="submit-btn" disabled onclick="submitVote()">Submit answer</button>
    </div>

    <div id="results-view" style="display:none">
      <div class="results" id="results-list"></div>
      <p class="total-note" id="total-note"></p>
    </div>
  </div>
</div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var intakeId = params.get("intake") || "default"; 
  var uid = params.get("uid") || "user";
  var selected = null;

  document.getElementById("poll-question").textContent = POLL.question;
  buildOptions();

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ action: "load", intakeId: intakeId, uid: uid })
  })
  .then(r => r.json())
  .then(data => {
    document.getElementById("skeleton-view").style.display = "none";
    if (data.voted) {
      renderResults(data.counts, data.total, false, data.answer);
    } else {
      document.getElementById("vote-view").style.display = "block";
    }
  })
  .catch(() => {
    document.getElementById("skeleton-view").textContent = "Error loading poll.";
  });

  function buildOptions() {
    var list = document.getElementById("options-list");
    POLL.options.forEach((opt, i) => {
      var btn = document.createElement("button");
      btn.className = "option-btn";
      btn.textContent = opt;
      btn.onclick = () => {
        selected = i;
        document.querySelectorAll(".option-btn").forEach((b, idx) => {
           b.style.borderColor = (idx === i) ? "var(--brand)" : "#ddd";
           b.style.background = (idx === i) ? "#f0f2ff" : "#fff";
        });
        document.getElementById("submit-btn").disabled = false;
      };
      list.appendChild(btn);
    });
  }

  window.submitVote = function() {
    document.getElementById("submit-btn").disabled = true;
    document.getElementById("submit-btn").textContent = "Saving...";

    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ action: "vote", intakeId: intakeId, option: POLL.options[selected], uid: uid })
    })
    .then(r => r.json())
    .then(data => renderResults(data.counts, data.total, true, POLL.options[selected]));
  };

  function renderResults(counts, total, justVoted, myAnswer) {
    var box = document.getElementById("results-list");
    box.innerHTML = "";

    POLL.options.forEach(opt => {
      var votes = (counts && counts[opt]) ? counts[opt] : 0;
      var pct = total > 0 ? Math.round((votes / total) * 100) : 0;

      var row = document.createElement("div");
      row.className = "result-row";
      row.innerHTML = `
        <div class="result-label">${opt}</div>
        <div class="bar-container">
          <div class="bar-track">
            <div class="bar-fill" style="width: ${pct}%">
              <span class="inner-number">${votes}</span>
            </div>
          </div>
          <div class="result-pct">${pct}%</div>
        </div>
      `;
      box.appendChild(row);
    });

    document.getElementById("total-note").textContent = total + " responses so far";
    document.getElementById("vote-view").style.display = "none";
    document.getElementById("results-view").style.display = "block";
  }
})();
</script>
</body>
</html>
