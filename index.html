<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poll</title>
<style>
  :root {
    --brand:      #2E45B8;
    --bar-bg:     #ebedfa;
    --text:       #0d0d0d;
    --text-muted: #555555;
    --bg:         #ffffff;
    --radius:     4px;
    --font:       system-ui, 'Segoe UI', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: var(--font); background: transparent; color: var(--text); }

  body {
    padding: 16px;
  }

  .poll {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: var(--bg);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 24px;
    height: 460px; /* Increased to fit results and footer cleanly */
    display: flex;
    flex-direction: column;
  }

  .poll-question {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 20px;
  }

  #loading-view, #vote-view, #results-view {
    display: none;
    flex-direction: column;
    flex-grow: 1;
  }

  #loading-view { display: flex; }

  .options, .results { 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
  }

  .option-btn {
    display: flex; align-items: center; padding: 14px 16px;
    border: 1px solid #ddd; border-radius: var(--radius);
    background: var(--bg); cursor: pointer; font-size: 15px;
    color: var(--text); width: 100%; transition: 0.15s;
    font-family: var(--font);
    height: 50px;
  }
  .option-btn:hover  { background: #f9f9f9; border-color: var(--brand); }
  .option-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .submit-btn {
    margin-top: 16px;
    width: 100%; padding: 12px;
    background: var(--brand); color: #fff; border: none;
    border-radius: var(--radius); font-weight: 600; cursor: pointer;
    font-family: var(--font); font-size: 15px;
    transition: opacity 0.2s, background 0.15s;
    height: 44px;
  }
  .submit-btn:hover    { background: #1a2a6e; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .result-row {
    border: 1px solid #e0e0e0;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    border-radius: var(--radius);
    height: 74px;
  }

  .result-label {
    font-size: 14px; font-weight: 500;
    padding-bottom: 0.5rem;
    color: var(--text);
  }
  .result-label.mine { color: var(--brand); font-weight: 700; }

  .bar-container {
    display: flex; align-items: center;
    justify-content: space-between; gap: 12px;
  }

  .bar-track {
    flex-grow: 1; height: 20px;
    background: var(--bar-bg); position: relative;
    border-radius: var(--radius);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%; background: var(--brand);
    width: 0%; transition: width 0.5s cubic-bezier(0.1,0.5,0.5,1);
    display: flex; align-items: center;
    justify-content: flex-end; min-width: 24px;
  }

  .inner-number { 
    color: white; font-size: 11px; 
    padding-right: 0.5rem; 
  }
  .result-pct { font-size: 14px; min-width: 38px; text-align: right; font-weight: 500; color: var(--text); }

  .footer-text-line {
    margin-top: auto; /* Pushes text up inside the padding zone cleanly */
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .skel {
    border-radius: var(--radius);
    background: #f0f0f0;
    animation: pulse 1.5s infinite ease-in-out;
  }
  .skel-option { height: 50px; margin-bottom: 10px; }
  .skel-option:last-child { margin-bottom: 0; }
  .skel-submit { height: 44px; }

  @keyframes pulse {
    0%   { opacity: 0.6; }
    50%  { opacity: 1.0; }
    100% { opacity: 0.6; }
  }

  .error-banner {
    padding: 16px; background: #fdf3f2; border: 1px solid #e8b4b0;
    border-radius: var(--radius); font-size: 14px; color: #7a2020;
    line-height: 1.5; text-align: center;
  }
  #error-view { display: none; flex-grow: 1; align-items: center; justify-content: center; }
</style>
</head>
